<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Наше Такси</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- БЕСПЛАТНАЯ КАРТА (БЕЗ КЛЮЧЕЙ) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { background-color: #FAF8F5 !important; color: #2A2622 !important; }
        .glass-panel { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.6); }
        .user-marker { width: 16px; height: 16px; background: #5C7A4A; border: 3px solid white; border-radius: 50%; box-shadow: 0 0 0 0 rgba(92, 122, 74, 0.7); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(92, 122, 74, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(92, 122, 74, 0); } 100% { box-shadow: 0 0 0 0 rgba(92, 122, 74, 0); } }
    </style>
</head>
<body class="font-sans antialiased">
    
    <!-- Шапка -->
    <nav class="fixed top-0 left-0 right-0 z-50 glass-panel border-b border-warm-400/10">
        <div class="max-w-7xl mx-auto px-4 h-14 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-[#5C7A4A] rounded-lg flex items-center justify-center">
                    <iconify-icon icon="lucide:car" class="text-white"></iconify-icon>
                </div>
                <span class="font-serif text-lg font-medium text-[#2A2622]">Наше Такси</span>
            </div>
            <div class="text-xs font-medium text-[#5C7A4A] bg-[#7D9468]/10 px-2 py-1 rounded-full">Онлайн</div>
        </div>
    </nav>

    <!-- Основной блок -->
    <section class="pt-16 min-h-screen flex flex-col">
        <!-- Карта -->
        <div class="flex-1 relative">
            <div id="map" style="height: 100%; width: 100%; position: absolute; top:0; left:0; z-index: 1;"></div>
            
            <!-- Кнопки на карте -->
            <div class="absolute top-4 right-4 z-[1000] flex flex-col gap-2">
                <button onclick="locateUser()" class="w-10 h-10 bg-white rounded-xl shadow-lg flex items-center justify-center text-[#5C7A4A] hover:scale-105 transition-transform">
                    <iconify-icon icon="lucide:locate" class="text-xl"></iconify-icon>
                </button>
            </div>
            <div class="absolute top-4 left-4 z-[1000] glass-panel rounded-xl px-3 py-1.5 text-xs text-[#2A2622]">
                Тапните карту, чтобы выбрать <strong>куда</strong>
            </div>
        </div>

        <!-- Нижняя панель -->
        <div class="relative z-[1001] bg-[#FAF8F5] rounded-t-[2rem] shadow-2xl flex flex-col" style="max-height: 55vh;">
            
            <!-- Статистика -->
            <div class="p-3 border-b border-gray-100 bg-white/50 rounded-t-[2rem]">
                <div class="grid grid-cols-4 gap-2 text-center">
                    <div><p class="text-lg font-serif font-bold text-[#2A2622]">14</p><p class="text-[10px] text-gray-400">Машин</p></div>
                    <div><p class="text-lg font-serif font-bold text-[#2A2622]">1 204</p><p class="text-[10px] text-gray-400">Заказов</p></div>
                    <div><p class="text-lg font-serif font-bold text-[#2A2622]">1 180</p><p class="text-[10px] text-gray-400">Поездок</p></div>
                    <div><p class="text-lg font-serif font-bold text-[#2A2622]">8.5k</p><p class="text-[10px] text-gray-400">Км</p></div>
                </div>
            </div>

            <div class="p-4 overflow-y-auto">
                <!-- Поля ввода -->
                <div class="space-y-3 mb-4">
                    <div class="flex items-center gap-3 p-3 bg-white rounded-xl border border-gray-100 shadow-sm">
                        <div class="w-2.5 h-2.5 bg-[#5C7A4A] rounded-full"></div>
                        <input type="text" id="from-address" placeholder="Откуда (определяется...)" class="w-full bg-transparent text-sm text-[#2A2622] placeholder:text-gray-300 outline-none" readonly>
                    </div>
                    
                    <div class="flex items-center gap-3 p-3 bg-white rounded-xl border border-gray-100 shadow-sm">
                        <div class="w-2.5 h-2.5 bg-red-500 rounded-full"></div>
                        <input type="text" id="to-address" placeholder="Куда едем?" class="w-full bg-transparent text-sm text-[#2A2622] placeholder:text-gray-300 outline-none" readonly>
                        <button onclick="clearRoute()" class="text-gray-300 hover:text-red-400 p-1">
                            <iconify-icon icon="lucide:x" class="text-lg"></iconify-icon>
                        </button>
                    </div>
                </div>

                <!-- Цена -->
                <div id="route-info" class="hidden bg-[#7D9468]/10 rounded-xl p-3 mb-4 flex justify-between items-center border border-[#7D9468]/20">
                    <div>
                        <p class="text-xs text-gray-500">Стоимость</p>
                        <p class="text-xl font-serif font-bold text-[#5C7A4A]" id="route-price">0 ₽</p>
                    </div>
                    <div class="text-right">
                        <p class="text-xs text-gray-500">Расстояние</p>
                        <p class="text-sm font-medium text-[#2A2622]" id="route-distance">0 км</p>
                    </div>
                </div>
                
                <!-- Кнопка заказа -->
                <button onclick="submitOrder()" id="order-btn" class="w-full bg-[#5C7A4A] text-white py-3 rounded-xl font-medium hover:bg-[#4A6239] transition-all shadow-lg flex items-center justify-center gap-2 active:scale-[0.99]">
                    <span>Заказать такси</span>
                </button>
            </div>
        </div>
    </section>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        let map;
        let fromMarker = null;
        let toMarker = null;
        let routeLine = null;
        
        const PRICE_PER_KM = 100;

        // Инициализация карты
        document.addEventListener('DOMContentLoaded', () => {
            map = L.map('map', { zoomControl: false }).setView([55.75, 37.61], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '' }).addTo(map);
            map.on('click', onMapClick);
            locateUser();
        });

        function locateUser() {
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    map.setView([lat, lon], 15);
                    
                    if (fromMarker) map.removeLayer(fromMarker);
                    fromMarker = L.marker([lat, lon], {
                        icon: L.divIcon({ className: 'user-marker', iconSize: [16, 16], iconAnchor: [8, 8] })
                    }).addTo(map);
                    
                    document.getElementById('from-address').value = "Я здесь";
                },
                (err) => console.log(err)
            );
        }

        function onMapClick(e) {
            const lat = e.latlng.lat;
            const lon = e.latlng.lng;
            
            if (toMarker) map.removeLayer(toMarker);
            toMarker = L.marker([lat, lon], {
                icon: L.divIcon({
                    html: `<div style="width:20px;height:20px;background:#ef4444;border:3px solid white;border-radius:50%;box-shadow:0 2px 5px rgba(0,0,0,0.3)"></div>`,
                    className: '', iconSize: [20, 20], iconAnchor: [10, 10]
                })
            }).addTo(map);
            
            document.getElementById('to-address').value = "Точка на карте";
            calculateRoute();
        }

        function calculateRoute() {
            if (!fromMarker || !toMarker) return;
            
            const from = fromMarker.getLatLng();
            const to = toMarker.getLatLng();
            
            const distance = map.distance(from, to) / 1000;
            const price = Math.round(distance * PRICE_PER_KM);
            
            if (routeLine) map.removeLayer(routeLine);
            routeLine = L.polyline([from, to], { color: '#5C7A4A', weight: 4, dashArray: '5 5' }).addTo(map);
            
            document.getElementById('route-distance').textContent = distance.toFixed(1) + ' км';
            document.getElementById('route-price').textContent = price + ' ₽';
            document.getElementById('route-info').classList.remove('hidden');
        }
        
        function clearRoute() {
            if (toMarker) map.removeLayer(toMarker);
            if (routeLine) map.removeLayer(routeLine);
            toMarker = null; routeLine = null;
            document.getElementById('to-address').value = '';
            document.getElementById('route-info').classList.add('hidden');
        }

        function submitOrder() {
            const btn = document.getElementById('order-btn');
            const from = document.getElementById('from-address').value;
            const to = document.getElementById('to-address').value;
            const price = document.getElementById('route-price').textContent;

            if (!from || !to) {
                tg.showAlert("Выберите маршрут на карте.");
                return;
            }

            btn.disabled = true;
            btn.innerHTML = "Отправка...";

            fetch('https://nashe-taxi.vercel.app/api/order', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    user: tg.initDataUnsafe.user,
                    from: from,
                    to: to,
                    price: price
                })
            })
            .then(res => res.json())
            .then(data => {
                btn.innerHTML = "Готово!";
                tg.showAlert("Заказ принят! Ожидайте звонка.");
            })
            .catch(e => {
                btn.disabled = false;
                btn.innerHTML = "Заказать такси";
                tg.showAlert("Ошибка соединения. Проверьте интернет.");
            });
        }
    </script>
</body>
</html>
