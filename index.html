<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Наше Такси</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        beige: { 50: '#FAF8F5', 100: '#F5F0E8' },
                        sage: { 500: '#7D9468', 600: '#5C7A4A' },
                        warm: { 400: '#A69E94', 800: '#3A352F', 900: '#2A2622' }
                    },
                    fontFamily: { serif: ['Playfair Display', 'serif'], sans: ['Geist', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { background-color: #FAF8F5 !important; color: #2A2622 !important; }
        .glass-panel { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.6); }
        .glass-nav { background: rgba(250, 248, 245, 0.95); backdrop-filter: blur(16px); }
        @keyframes fadeUp { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }
        .animate-fade-up { animation: fadeUp 0.8s ease forwards; }
        
        .leaflet-tile-pane { filter: grayscale(30%) sepia(20%) hue-rotate(70deg) saturate(150%); }
        .leaflet-control-zoom { display: none; }
        
        .user-location-marker {
            width: 16px; height: 16px;
            background: #5C7A4A;
            border: 3px solid white;
            border-radius: 50%;
            box-shadow: 0 0 0 0 rgba(92, 122, 74, 0.7);
            animation: pulse-loc 2s infinite;
        }
        @keyframes pulse-loc {
            0% { box-shadow: 0 0 0 0 rgba(92, 122, 74, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(92, 122, 74, 0); }
            100% { box-shadow: 0 0 0 0 rgba(92, 122, 74, 0); }
        }
    </style>
</head>
<body class="font-sans antialiased">
    
    <!-- Navigation -->
    <nav class="fixed top-0 left-0 right-0 z-50 glass-nav border-b border-warm-400/10">
        <div class="max-w-7xl mx-auto px-4 h-14 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-sage-600 rounded-lg flex items-center justify-center">
                    <iconify-icon icon="lucide:car" class="text-white"></iconify-icon>
                </div>
                <span class="font-serif text-lg font-medium text-warm-900">Наше Такси</span>
            </div>
            <div class="text-xs font-medium text-sage-600 bg-sage-500/10 px-2 py-1 rounded-full flex items-center gap-1">
                <span class="w-1.5 h-1.5 bg-sage-600 rounded-full animate-pulse"></span> Онлайн
            </div>
        </div>
    </nav>

    <!-- Main Layout -->
    <section class="pt-16 min-h-screen flex flex-col">
        <div class="flex-1 relative">
             <!-- Map Container -->
            <div id="map" style="height: 100%; width: 100%; position: absolute; top:0; left:0; z-index: 1;"></div>
            
            <!-- Map UI Overlay -->
            <div class="absolute top-4 left-4 right-4 z-[1000] flex justify-between items-start pointer-events-none">
                <div class="glass-panel rounded-xl px-3 py-1.5 text-xs text-warm-600 pointer-events-auto">
                    Тапните карту или введите адрес вручную
                </div>
                <div class="flex flex-col gap-2 pointer-events-auto">
                    <button onclick="zoomIn()" class="w-9 h-9 bg-white rounded-xl shadow-lg flex items-center justify-center text-warm-600 hover:text-sage-600 text-xl font-light">+</button>
                    <button onclick="zoomOut()" class="w-9 h-9 bg-white rounded-xl shadow-lg flex items-center justify-center text-warm-600 hover:text-sage-600 text-xl font-light">−</button>
                    <button onclick="locateUser()" class="w-9 h-9 bg-white rounded-xl shadow-lg flex items-center justify-center text-sage-600 hover:text-sage-800 transition-colors">
                        <iconify-icon icon="lucide:locate" class="text-lg"></iconify-icon>
                    </button>
                </div>
            </div>
        </div>

        <!-- Bottom Sheet -->
        <div class="relative z-[1001] bg-beige-50 rounded-t-[2rem] shadow-2xl border-t border-warm-400/10 flex flex-col" style="max-height: 60vh;">
            
            <!-- Stats Bar -->
            <div class="p-3 border-b border-warm-400/10 bg-white/50 rounded-t-[2rem]">
                <div class="grid grid-cols-4 gap-2 text-center">
                    <div>
                        <p class="text-lg font-serif font-bold text-warm-800" id="stat-drivers">14</p>
                        <p class="text-[10px] text-warm-400">Машин</p>
                    </div>
                    <div>
                        <p class="text-lg font-serif font-bold text-warm-800" id="stat-orders">1 204</p>
                        <p class="text-[10px] text-warm-400">Заказов</p>
                    </div>
                    <div>
                        <p class="text-lg font-serif font-bold text-warm-800" id="stat-routes">1 180</p>
                        <p class="text-[10px] text-warm-400">Поездок</p>
                    </div>
                    <div>
                        <p class="text-lg font-serif font-bold text-warm-800" id="stat-km">8.5k</p>
                        <p class="text-[10px] text-warm-400">Километров</p>
                    </div>
                </div>
            </div>

            <div class="p-4 overflow-y-auto">
                <!-- Inputs -->
                <div class="space-y-3 mb-4">
                    <div class="flex items-center gap-3 p-3 bg-white rounded-xl border border-warm-100 shadow-sm">
                        <div class="w-2.5 h-2.5 bg-sage-500 rounded-full"></div>
                        <input type="text" id="from-address" placeholder="Откуда" class="w-full bg-transparent text-sm text-warm-800 placeholder:text-warm-300 outline-none">
                    </div>
                    
                    <div class="flex items-center gap-3 p-3 bg-white rounded-xl border border-warm-100 shadow-sm">
                        <div class="w-2.5 h-2.5 bg-red-500 rounded-full"></div>
                        <input type="text" id="to-address" placeholder="Куда едем?" class="w-full bg-transparent text-sm text-warm-800 placeholder:text-warm-300 outline-none">
                        <button onclick="clearRoute()" class="text-warm-300 hover:text-red-400 p-1">
                            <iconify-icon icon="lucide:x" class="text-lg"></iconify-icon>
                        </button>
                    </div>
                </div>

                <!-- Price Info -->
                <div id="route-info" class="hidden bg-sage-50 rounded-xl p-3 mb-4 flex justify-between items-center border border-sage-100">
                    <div>
                        <p class="text-xs text-warm-400">Приблизительная стоимость</p>
                        <p class="text-xl font-serif font-bold text-sage-600" id="route-price">0 ₽</p>
                    </div>
                    <div class="text-right">
                        <p class="text-xs text-warm-400">Расстояние</p>
                        <p class="text-sm font-medium text-warm-700" id="route-distance">0 км</p>
                    </div>
                </div>
                
                <!-- MANUAL ORDER BUTTON (New) -->
                <button onclick="submitOrder()" class="w-full bg-sage-600 text-white py-3 rounded-xl font-medium hover:bg-sage-700 transition-all shadow-lg flex items-center justify-center gap-2 active:scale-[0.99]">
                    <iconify-icon icon="lucide:send" class="text-lg"></iconify-icon>
                    <span>Заказать такси</span>
                </button>
                
                <p class="text-[10px] text-warm-300 text-center mt-3">Тариф: 100 ₽/км • Работает 24/7</p>
            </div>
        </div>
    </section>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        // Скрываем нижнюю кнопку Telegram, так как у нас теперь есть кнопка внутри
        tg.MainButton.hide(); 

        let map;
        let userMarker = null;
        let fromMarker = null;
        let toMarker = null;
        let routeLine = null;
        let userCoords = null;

        const PRICE_PER_KM = 100;

        document.addEventListener('DOMContentLoaded', initMap);

        function initMap() {
            map = L.map('map', { zoomControl: false }).setView([55.75, 37.61], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '' }).addTo(map);
            map.on('click', onMapClick);
            locateUser();
        }

        function locateUser() {
            if (!navigator.geolocation) return;
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    const { latitude, longitude } = pos.coords;
                    userCoords = { lat: latitude, lon: longitude };
                    map.setView([latitude, longitude], 16);
                    if (userMarker) map.removeLayer(userMarker);
                    userMarker = L.marker([latitude, longitude], {
                        icon: L.divIcon({ className: 'user-location-marker', iconSize: [16, 16], iconAnchor: [8, 8] })
                    }).addTo(map);
                    setPoint(latitude, longitude, 'from');
                },
                (err) => { console.error(err); }
            );
        }

        function onMapClick(e) {
            setPoint(e.latlng.lat, e.latlng.lng, 'to');
            buildRoute();
        }

        function setPoint(lat, lng, type) {
            const isFrom = type === 'from';
            const color = isFrom ? '#5C7A4A' : '#ef4444';
            const iconHtml = `<div style="width:20px;height:20px;background:${color};border:3px solid white;border-radius:50%;box-shadow:0 2px 5px rgba(0,0,0,0.3)"></div>`;
            
            const marker = L.marker([lat, lng], {
                icon: L.divIcon({ html: iconHtml, className: '', iconSize: [20, 20], iconAnchor: [10, 10] })
            }).addTo(map);

            if (isFrom) {
                if (fromMarker) map.removeLayer(fromMarker);
                fromMarker = marker;
                document.getElementById('from-address').value = "Я здесь";
            } else {
                if (toMarker) map.removeLayer(toMarker);
                toMarker = marker;
                document.getElementById('to-address').value = "Точка назначения";
            }
        }

        function buildRoute() {
            if (!fromMarker || !toMarker) return;
            
            const from = fromMarker.getLatLng();
            const to = toMarker.getLatLng();
            
            const distance = map.distance(from, to);
            const price = Math.round((distance / 1000) * PRICE_PER_KM);
            
            if (routeLine) map.removeLayer(routeLine);
            routeLine = L.polyline([from, to], { color: '#5C7A4A', weight: 4, dashArray: '10, 10' }).addTo(map);
            
            map.fitBounds([from, to], { padding: [80, 80] });

            document.getElementById('route-distance').textContent = (distance / 1000).toFixed(1) + ' км';
            document.getElementById('route-price').textContent = price + ' ₽';
            document.getElementById('route-info').classList.remove('hidden');
        }

        function clearRoute() {
            if (toMarker) map.removeLayer(toMarker);
            if (routeLine) map.removeLayer(routeLine);
            toMarker = null; routeLine = null;
            document.getElementById('to-address').value = '';
            document.getElementById('route-info').classList.add('hidden');
        }
        
        function zoomIn() { map.zoomIn(); }
        function zoomOut() { map.zoomOut(); }

        // Главная функция отправки заказа
        function submitOrder() {
            const from = document.getElementById('from-address').value;
            const to = document.getElementById('to-address').value;
            const price = document.getElementById('route-price').textContent || "По договоренности";
            
            if (!from || !to) {
                tg.showAlert("Пожалуйста, заполните поля 'Откуда' и 'Куда'.");
                return;
            }

            // Показываем анимацию загрузки прямо на кнопке (если нужно, можно добавить спиннер)
            // Но проще заблокировать кнопку
            const btn = event.currentTarget;
            btn.disabled = true;
            btn.innerHTML = '<iconify-icon icon="lucide:loader-2" class="animate-spin text-lg"></iconify-icon> Ищем водителя...';

            // Обновляем статистику
            const o = document.getElementById('stat-orders'); 
            o.textContent = (parseInt(o.textContent.replace(/\s/g, '')) + 1).toLocaleString();

            fetch('https://nashe-taxi.vercel.app/api/order', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    user: tg.initDataUnsafe.user,
                    from: from,
                    to: to,
                    price: price
                })
            })
            .then(() => {
                btn.disabled = false;
                btn.innerHTML = '<iconify-icon icon="lucide:check" class="text-lg"></iconify-icon> Заказ принят!';
                
                setTimeout(() => {
                    tg.showPopup({
                        title: "✅ Успешно",
                        message: "Ваш заказ передан водителям. Ожидайте звонка!",
                        buttons: [{type: "ok"}]
                    }, () => tg.close());
                }, 500);
            })
            .catch(() => {
                btn.disabled = false;
                btn.innerHTML = '<iconify-icon icon="lucide:send" class="text-lg"></iconify-icon> Заказать такси';
                tg.showAlert("Ошибка соединения. Проверьте интернет.");
            });
        }
    </script>
</body>
</html>
