<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Наше Такси</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        h1 { margin-top: 50px; font-size: 24px; }
        p { color: var(--tg-theme-hint_color, #888); margin-bottom: 30px; }
        
        input {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #ddd;
            font-size: 16px;
            box-sizing: border-box;
            margin-bottom: 15px;
            background: var(--tg-theme-secondary_bg_color, #f0f0f0);
            color: var(--tg-theme-text-color, #000);
        }
        
        /* Просто красивая картинка вместо карты */
        .map-placeholder {
            width: 100%;
            height: 150px;
            background: #e0e0e0;
            border-radius: 15px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }
    </style>
</head>
<body>

    <div class="map-placeholder">🗺️</div>

    <h1>Наше Такси</h1>
    <p>Быстро. Надежно. По-свойски.</p>

    <input type="text" id="input-from" placeholder="Откуда заберем?" value="Мое местоположение">
    <input type="text" id="input-to" placeholder="Куда едем?">

    <script>
        const tg = window.Telegram.WebApp;
        
        // Разворачиваем на весь экран
        tg.expand();

        // Настраиваем ГЛАВНУЮ КНОПКУ
        tg.MainButton.setText("🚕 Вызвать такси");
        tg.MainButton.show();

        // Что происходит при нажатии
        tg.MainButton.onClick(() => {
            const to = document.getElementById('input-to').value;
            
            if (!to) {
                tg.showAlert("Куда едем?");
                return;
            }

            // Показываем загрузку на кнопке
            tg.MainButton.showProgress();

            // Имитация отправки (просто ждем 2 секунды)
            setTimeout(() => {
                tg.MainButton.hideProgress();
                
                tg.showPopup({
                    title: "Готово! ✅",
                    message: "Ваш заказ принят. Ожидайте машину!",
                    buttons: [{type: "ok"}]
                }, () => {
                    // Закрываем приложение
                    tg.close();
                });
            }, 2000);
        });
    </script>
</body>
</html>
