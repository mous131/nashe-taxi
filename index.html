<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Наше Такси</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Подключаем карту -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>
    <style> 
        :root {
            --bg: var(--tg-theme-bg-color, #ffffff);
            --text: var(--tg-theme-text-color, #000000);
            --hint: var(--tg-theme-hint_color, #999999);
            --secondary-bg: var(--tg-theme-secondary_bg_color, #f4f4f5);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 80px; }
        
        /* Карта */
        #map { width: 100%; height: 40vh; min-height: 250px; z-index: 1; }

        /* Форма */
        .container { padding: 16px; }
        .input-card {
            background: var(--secondary-bg);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .route-point {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .route-point:last-child { border-bottom: none; }
        .dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            margin-right: 12px;
        }
        .dot.from { background: #22c55e; }
        .dot.to { background: #ef4444; }
        input {
            border: none;
            background: transparent;
            width: 100%;
            font-size: 16px;
            color: var(--text);
            outline: none;
        }
    </style>
</head>
<body>

    <!-- Карта -->
    <div id="map"></div>

    <div class="container">
        <div class="input-card">
            <div class="route-point">
                <div class="dot from"></div>
                <input type="text" id="input-from" placeholder="Откуда" value="Мое местоположение">
            </div>
            <div class="route-point">
                <div class="dot to"></div>
                <input type="text" id="input-to" placeholder="Куда едем?">
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // 1. Настраиваем карту
        var map = L.map('map').setView([55.7558, 37.6173], 13); // Москва по умолчанию
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        // Маркер
        var marker = L.marker([55.7558, 37.6173]).addTo(map);

        // Пробуем определить геолокацию
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                map.setView([lat, lon], 15);
                marker.setLatLng([lat, lon]);
                document.getElementById('input-from').value = "Я здесь";
            });
        }

        // 2. Кнопка заказа
        tg.MainButton.setText("🚕 Вызвать такси");
        tg.MainButton.show();
        tg.MainButton.onClick(() => {
            const to = document.getElementById('input-to').value;
            if(!to) {
                tg.showAlert("Куда едем?");
                return;
            }

            tg.MainButton.showProgress();
            
            // Отправляем заказ на сервер Vercel
            fetch('https://nashe-taxi.vercel.app/api/order', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    user: tg.initDataUnsafe.user,
                    to: to
                })
            })
            .then(res => res.json())
            .then(data => {
                tg.MainButton.hideProgress();
                tg.showPopup({
                    title: "✅ Готово",
                    message: "Водитель принят! Ожидайте.",
                    buttons: [{type: "ok"}]
                });
            })
            .catch(() => {
                tg.MainButton.hideProgress();
                tg.showAlert("Ошибка соединения");
            });
        });
    </script>
</body>
</html>
