<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Наше Такси</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Яндекс Карты (ВСТАВЬТЕ ВАШ КЛЮЧ!) -->
    <script src="https://api-maps.yandex.ru/2.1/?apikey=ВАШ_API_КЛЮЧ&lang=ru_RU" type="text/javascript"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        body { background-color: #FAF8F5 !important; color: #2A2622 !important; }
        .glass-panel { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.6); }
        
        /* Скрываем лишние элементы яндекса для чистоты */
        .ymaps-2-1-79-controls__control_toolbar, .ymaps-2-1-79-copyright, .ymaps-2-1-79-map-copyrights-promo { display: none !important; }
    </style>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { 
                beige: { 50: '#FAF8F5' }, 
                sage: { 500: '#7D9468', 600: '#5C7A4A' }, 
                warm: { 400: '#A69E94', 800: '#3A352F', 900: '#2A2622' } 
            }}}
        }
    </script>
</head>
<body class="font-sans antialiased">

    <section class="pt-16 min-h-screen flex flex-col">
        <div class="flex-1 relative">
             <!-- Яндекс Карта -->
            <div id="map" style="height: 100%; width: 100%; position: absolute; top:0; left:0; z-index: 1;"></div>
        </div>

        <!-- Нижняя панель -->
        <div class="relative z-[1001] bg-beige-50 rounded-t-[2rem] shadow-2xl border-t border-warm-400/10 flex flex-col" style="max-height: 55vh;">
            
            <!-- Статистика -->
            <div class="p-3 border-b border-warm-400/10 bg-white/50 rounded-t-[2rem]">
                <div class="grid grid-cols-4 gap-2 text-center">
                    <div><p class="text-lg font-serif font-bold text-warm-800" id="stat-drivers">14</p><p class="text-[10px] text-warm-400">Машин</p></div>
                    <div><p class="text-lg font-serif font-bold text-warm-800" id="stat-orders">1 204</p><p class="text-[10px] text-warm-400">Заказов</p></div>
                    <div><p class="text-lg font-serif font-bold text-warm-800" id="stat-routes">1 180</p><p class="text-[10px] text-warm-400">Поездок</p></div>
                    <div><p class="text-lg font-serif font-bold text-warm-800" id="stat-km">8.5k</p><p class="text-[10px] text-warm-400">Км</p></div>
                </div>
            </div>

            <div class="p-4 overflow-y-auto">
                <!-- Поля ввода -->
                <div class="space-y-3 mb-4">
                    <div class="flex items-center gap-3 p-3 bg-white rounded-xl border border-warm-100 shadow-sm">
                        <div class="w-2.5 h-2.5 bg-sage-500 rounded-full"></div>
                        <input type="text" id="from-address" placeholder="Откуда" class="w-full bg-transparent text-sm text-warm-800 outline-none" readonly>
                    </div>
                    
                    <div class="flex items-center gap-3 p-3 bg-white rounded-xl border border-warm-100 shadow-sm">
                        <div class="w-2.5 h-2.5 bg-red-500 rounded-full"></div>
                        <input type="text" id="to-address" placeholder="Куда едем?" class="w-full bg-transparent text-sm text-warm-800 outline-none">
                        <button onclick="clearRoute()" class="text-warm-300 hover:text-red-400 p-1">
                            <iconify-icon icon="lucide:x" class="text-lg"></iconify-icon>
                        </button>
                    </div>
                </div>

                <!-- Цена -->
                <div id="route-info" class="hidden bg-sage-50 rounded-xl p-3 mb-4 flex justify-between items-center border border-sage-100">
                    <div>
                        <p class="text-xs text-warm-400">Стоимость</p>
                        <p class="text-xl font-serif font-bold text-sage-600" id="route-price">0 ₽</p>
                    </div>
                    <div class="text-right">
                        <p class="text-xs text-warm-400">Расстояние</p>
                        <p class="text-sm font-medium text-warm-700" id="route-distance">0 км</p>
                    </div>
                </div>
                
                <!-- Кнопка заказа -->
                <button onclick="submitOrder()" id="order-btn" class="w-full bg-sage-600 text-white py-3 rounded-xl font-medium hover:bg-sage-700 transition-all shadow-lg flex items-center justify-center gap-2 active:scale-[0.99]">
                    <span>Заказать такси</span>
                </button>
            </div>
        </div>
    </section>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.MainButton.hide();

        let myMap;
        let fromPoint = null;
        let toPoint = null;
        let routeLine = null;
        
        const PRICE_PER_KM = 100;

        // Инициализация Яндекс Карты
        ymaps.ready(init);

        function init() {
            myMap = new ymaps.Map("map", {
                center: [55.75, 37.61], // Москва
                zoom: 12,
                controls: [] // Убираем стандартные кнопки управления
            });

            // Пробуем геолокацию
            var geolocation = ymaps.geolocation;
            geolocation.get({
                provider: 'browser', // Используем браузерную геолокацию
                mapStateAutoApply: true
            }).then(function (result) {
                // Успешно нашли
                var coords = result.geoObjects.position;
                myMap.setCenter(coords, 15);
                setFrom(coords);
            }, function (e) {
                console.log("Не удалось определить местоположение");
            });

            // Клик по карте
            myMap.events.add('click', function (e) {
                var coords = e.get('coords');
                if (!toPoint) {
                    setTo(coords);
                } else {
                    clearRoute();
                    setTo(coords);
                }
                calculatePrice();
            });
        }

        function setFrom(coords) {
            if (fromPoint) myMap.geoObjects.remove(fromPoint);
            
            fromPoint = new ymaps.Placemark(coords, {
                balloonContent: 'Вы здесь'
            }, {
                preset: 'islands#greenCircleIcon'
            });
            myMap.geoObjects.add(fromPoint);
            document.getElementById('from-address').value = "Мое местоположение";
        }

        function setTo(coords) {
            if (toPoint) myMap.geoObjects.remove(toPoint);
            
            toPoint = new ymaps.Placemark(coords, {
                balloonContent: 'Точка назначения'
            }, {
                preset: 'islands#redCircleIcon'
            });
            myMap.geoObjects.add(toPoint);
            
            // Получаем адрес (геокодирование)
            ymaps.geocode(coords).then(function(res) {
                var firstGeoObject = res.geoObjects.get(0);
                document.getElementById('to-address').value = firstGeoObject.getAddressLine();
            });
        }
        
        function calculatePrice() {
            if (!fromPoint || !toPoint) return;
            
            var fromCoords = fromPoint.geometry.getCoordinates();
            var toCoords = toPoint.geometry.getCoordinates();
            
            // Считаем расстояние (по прямой, для быстроты)
            var distance = ymaps.coordSystem.geo.getDistance(fromCoords, toCoords) / 1000; // в км
            
            var price = Math.round(distance * PRICE_PER_KM);
            
            document.getElementById('route-distance').textContent = distance.toFixed(1) + ' км';
            document.getElementById('route-price').textContent = price + ' ₽';
            document.getElementById('route-info').classList.remove('hidden');
            
            // Рисуем линию
            if (routeLine) myMap.geoObjects.remove(routeLine);
            routeLine = new ymaps.Polyline([fromCoords, toCoords], {}, { strokeColor: "#5C7A4A", strokeWidth: 4, strokeDashStyle: '5 5' });
            myMap.geoObjects.add(routeLine);
            myMap.setBounds([fromCoords, toCoords], {checkZoomRange: true, zoomMargin: 20});
        }

        function clearRoute() {
            if (toPoint) myMap.geoObjects.remove(toPoint);
            if (routeLine) myMap.geoObjects.remove(routeLine);
            toPoint = null; routeLine = null;
            document.getElementById('to-address').value = '';
            document.getElementById('route-info').classList.add('hidden');
        }

        // Отправка заказа
        function submitOrder() {
            const btn = document.getElementById('order-btn');
            const from = document.getElementById('from-address').value;
            const to = document.getElementById('to-address').value;
            const price = document.getElementById('route-price').textContent;

            if (!from || !to) {
                tg.showAlert("Выберите куда ехать на карте.");
                return;
            }

            btn.disabled = true;
            btn.innerHTML = "Отправка...";

            fetch('https://nashe-taxi.vercel.app/api/order', { // ПРОВЕРЬТЕ ССЫЛКУ!
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    user: tg.initDataUnsafe.user,
                    from: from,
                    to: to,
                    price: price
                })
            })
            .then(res => res.json())
            .then(data => {
                btn.innerHTML = "Готово!";
                tg.showAlert("Заказ принят! Ожидайте звонка.");
            })
            .catch(e => {
                btn.disabled = false;
                btn.innerHTML = "Заказать такси";
                tg.showAlert("Ошибка соединения. Проверьте интернет.");
            });
        }
    </script>
</body>
</html>
