<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Наше Такси - Заказ</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-marker {
            background: none;
            border: none;
        }
        .route-path {
            stroke: #3b82f6;
            stroke-width: 4;
            stroke-dasharray: 10;
            animation: dash 20s linear infinite;
        }
        @keyframes dash {
            to {
                stroke-dashoffset: -1000;
            }
        }
        .price-animation {
            animation: pulse 0.5s ease-in-out;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body class="bg-gray-100">
    <div class="max-w-md mx-auto bg-white min-h-screen">
        <!-- Шапка с анимацией -->
        <div class="bg-gradient-to-r from-blue-600 to-blue-700 text-white p-4 sticky top-0 z-10 shadow-lg">
            <h1 class="text-xl font-bold flex items-center gap-2">
                <span class="text-2xl">🚕</span>
                Наше Такси
            </h1>
            <div class="text-sm opacity-90">Быстро, безопасно, выгодно</div>
        </div>
        
        <!-- Карта -->
        <div id="map" class="h-80 w-full relative">
            <div id="loadingOverlay" class="absolute inset-0 bg-black bg-opacity-50 flex items-center justify-center z-20 hidden">
                <div class="bg-white rounded-lg p-4">
                    <div class="animate-spin text-2xl">🚕</div>
                    <div class="mt-2">Построение маршрута...</div>
                </div>
            </div>
        </div>
        
        <!-- Форма заказа -->
        <div class="p-4">
            <div class="bg-white rounded-lg shadow-md p-4 mb-4">
                <div class="flex items-center gap-3 mb-4">
                    <div class="w-8 h-8 bg-green-100 rounded-full flex items-center justify-center">
                        <span class="text-green-600 text-sm">📍</span>
                    </div>
                    <input type="text" id="fromInput" placeholder="Откуда" 
                           class="flex-1 p-2 border rounded-lg focus:outline-none focus:border-blue-500">
                </div>
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 bg-red-100 rounded-full flex items-center justify-center">
                        <span class="text-red-600 text-sm">🎯</span>
                    </div>
                    <input type="text" id="toInput" placeholder="Куда" 
                           class="flex-1 p-2 border rounded-lg focus:outline-none focus:border-blue-500">
                </div>
            </div>
            
            <!-- Выбор тарифа (как в Yandex-Go) -->
            <div class="mb-4">
                <div class="text-sm font-semibold mb-2">Тариф</div>
                <div class="grid grid-cols-4 gap-2">
                    <button class="tariff-btn p-2 rounded-lg border-2 border-blue-500 bg-blue-50" data-tariff="economy">
                        <div class="text-lg">🚗</div>
                        <div class="text-xs">Эконом</div>
                    </button>
                    <button class="tariff-btn p-2 rounded-lg border border-gray-200" data-tariff="comfort">
                        <div class="text-lg">🚙</div>
                        <div class="text-xs">Комфорт</div>
                    </button>
                    <button class="tariff-btn p-2 rounded-lg border border-gray-200" data-tariff="business">
                        <div class="text-lg">🚘</div>
                        <div class="text-xs">Бизнес</div>
                    </button>
                    <button class="tariff-btn p-2 rounded-lg border border-gray-200" data-tariff="minivan">
                        <div class="text-lg">🚐</div>
                        <div class="text-xs">Минивэн</div>
                    </button>
                </div>
            </div>
            
            <!-- Информация о поездке -->
            <div id="tripInfo" class="bg-gray-50 rounded-lg p-4 mb-4 hidden">
                <div class="flex justify-between mb-2">
                    <span class="text-gray-600">📏 Расстояние:</span>
                    <span id="distance" class="font-semibold">0 км</span>
                </div>
                <div class="flex justify-between mb-2">
                    <span class="text-gray-600">⏱️ Время в пути:</span>
                    <span id="duration" class="font-semibold">0 мин</span>
                </div>
                <div class="flex justify-between border-t pt-2 mt-2">
                    <span class="text-lg font-bold">💰 Стоимость:</span>
                    <span id="price" class="text-2xl font-bold text-green-600">0 ₽</span>
                </div>
                <div id="surgeWarning" class="mt-2 text-xs text-orange-600 hidden">
                    ⚠️ Повышенный спрос. Цена увеличена
                </div>
            </div>
            
            <button id="orderBtn" disabled 
                    class="w-full bg-blue-500 text-white py-3 rounded-lg font-bold text-lg disabled:opacity-50 disabled:cursor-not-allowed hover:bg-blue-600 transition">
                Заказать
            </button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        
        const API_URL = 'https://mous131s-projects.vercel.app';
        let map;
        let fromMarker, toMarker;
        let currentRoute;
        let currentTariff = 'economy';
        let priceDetails = {};
        
        // Инициализация карты
        function initMap() {
            map = L.map('map').setView([55.751244, 37.618423], 12);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);
            
            // Обработка кликов на карте
            map.on('click', async (e) => {
                const { lat, lng } = e.latlng;
                if (!fromMarker) {
                    setFromPoint(lat, lng);
                } else if (!toMarker) {
                    setToPoint(lat, lng);
                }
            });
            
            // Попытка получить геопозицию
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((position) => {
                    const { latitude, longitude } = position.coords;
                    map.setView([latitude, longitude], 14);
                    setFromPoint(latitude, longitude);
                });
            }
        }
        
        // Установка точки отправления
        async function setFromPoint(lat, lng) {
            if (fromMarker) map.removeLayer(fromMarker);
            
            fromMarker = L.marker([lat, lng], {
                icon: L.divIcon({
                    className: 'custom-marker',
                    html: '<div class="w-6 h-6 bg-green-500 rounded-full border-2 border-white shadow-lg"></div>',
                    iconSize: [24, 24]
                })
            }).addTo(map).bindPopup('Откуда');
            
            document.getElementById('fromInput').value = `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
            
            if (toMarker) {
                buildRoute();
            }
        }
        
        // Установка точки назначения
        async function setToPoint(lat, lng) {
            if (toMarker) map.removeLayer(toMarker);
            
            toMarker = L.marker([lat, lng], {
                icon: L.divIcon({
                    className: 'custom-marker',
                    html: '<div class="w-6 h-6 bg-red-500 rounded-full border-2 border-white shadow-lg"></div>',
                    iconSize: [24, 24]
                })
            }).addTo(map).bindPopup('Куда');
            
            document.getElementById('toInput').value = `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
            
            if (fromMarker) {
                buildRoute();
            }
        }
        
        // Построение маршрута (используем OSRM API)
        async function buildRoute() {
            const fromLatLng = fromMarker.getLatLng();
            const toLatLng = toMarker.getLatLng();
            
            document.getElementById('loadingOverlay').classList.remove('hidden');
            
            try {
                // Используем OSRM для построения маршрута
                const response = await fetch(
                    `https://router.project-osrm.org/route/v1/driving/${fromLatLng.lng},${fromLatLng.lat};${toLatLng.lng},${toLatLng.lat}?overview=full&geometries=geojson`
                );
                const data = await response.json();
                
                if (data.routes && data.routes[0]) {
                    const route = data.routes[0];
                    const distance = route.distance / 1000; // в км
                    const duration = Math.round(route.duration / 60); // в минутах
                    
                    // Отображаем маршрут на карте
                    if (currentRoute) map.removeLayer(currentRoute);
                    
                    currentRoute = L.geoJSON(route.geometry, {
                        style: {
                            color: '#3b82f6',
                            weight: 4,
                            opacity: 0.8
                        }
                    }).addTo(map);
                    
                    // Адаптируем границы карты под маршрут
                    const bounds = L.geoJSON(route.geometry).getBounds();
                    map.fitBounds(bounds, { padding: [50, 50] });
                    
                    // Получаем цену
                    await calculatePrice(distance, duration);
                }
            } catch (error) {
                console.error('Error building route:', error);
                tg.showAlert('Ошибка построения маршрута');
            } finally {
                document.getElementById('loadingOverlay').classList.add('hidden');
            }
        }
        
        // Расчет цены с нашим новым API
        async function calculatePrice(distance, duration) {
            try {
                const response = await fetch(`${API_URL}/api/calculate-price`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ distance })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    const price = data.tariffs[currentTariff];
                    priceDetails = data;
                    
                    document.getElementById('tripInfo').classList.remove('hidden');
                    document.getElementById('distance').textContent = `${distance.toFixed(1)} км`;
                    document.getElementById('duration').textContent = `${duration} мин`;
                    document.getElementById('price').textContent = `${price} ₽`;
                    
                    if (data.details.surgeApplied) {
                        document.getElementById('surgeWarning').classList.remove('hidden');
                    } else {
                        document.getElementById('surgeWarning').classList.add('hidden');
                    }
                    
                    // Анимация цены
                    document.getElementById('price').classList.add('price-animation');
                    setTimeout(() => {
                        document.getElementById('price').classList.remove('price-animation');
                    }, 500);
                    
                    document.getElementById('orderBtn').disabled = false;
                }
            } catch (error) {
                console.error('Error calculating price:', error);
            }
        }
        
        // Оформление заказа
        async function placeOrder() {
            const fromLatLng = fromMarker.getLatLng();
            const toLatLng = toMarker.getLatLng();
            
            const orderData = {
                from: document.getElementById('fromInput').value,
                to: document.getElementById('toInput').value,
                fromCoords: [fromLatLng.lat, fromLatLng.lng],
                toCoords: [toLatLng.lat, toLatLng.lng],
                distance: parseFloat(document.getElementById('distance').textContent),
                price: parseInt(document.getElementById('price').textContent),
                tariff: currentTariff,
                userId: tg.initDataUnsafe?.user?.id || 'anonymous',
                userName: tg.initDataUnsafe?.user?.first_name || 'Клиент'
            };
            
            try {
                const response = await fetch(`${API_URL}/api/order`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(orderData)
                });
                
                const data = await response.json();
                
                if (data.success) {
                    tg.showAlert(`✅ Заказ #${data.orderId} создан! Водитель скоро прибудет.`);
                    
                    // Отправляем данные обратно в бот
                    tg.sendData(JSON.stringify({
                        action: 'order_created',
                        orderId: data.orderId,
                        ...orderData
                    }));
                    
                    // Закрываем приложение через 3 секунды
                    setTimeout(() => {
                        tg.close();
                    }, 3000);
                } else {
                    tg.showAlert('❌ Ошибка создания заказа');
                }
            } catch (error) {
                console.error('Error placing order:', error);
                tg.showAlert('❌ Ошибка соединения');
            }
        }
        
        // Обработка выбора тарифа
        document.querySelectorAll('.tariff-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
                document.querySelectorAll('.tariff-btn').forEach(b => {
                    b.classList.remove('border-blue-500', 'bg-blue-50');
                    b.classList.add('border-gray-200');
                });
                btn.classList.remove('border-gray-200');
                btn.classList.add('border-blue-500', 'bg-blue-50');
                
                currentTariff = btn.dataset.tariff;
                
                if (fromMarker && toMarker) {
                    const fromLatLng = fromMarker.getLatLng();
                    const toLatLng = toMarker.getLatLng();
                    const distance = calculateDistance(fromLatLng, toLatLng);
                    await calculatePrice(distance, 15); // Время примерно
                }
            });
        });
        
        // Вспомогательная функция расчета расстояния
        function calculateDistance(point1, point2) {
            const R = 6371;
            const dLat = (point2.lat - point1.lat) * Math.PI / 180;
            const dLon = (point2.lng - point1.lng) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(point1.lat * Math.PI / 180) * Math.cos(point2.lat * Math.PI / 180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }
        
        document.getElementById('orderBtn').addEventListener('click', placeOrder);
        
        // Автодополнение адресов (можно добавить потом)
        // Инициализация
        initMap();
    </script>
</body>
</html>
