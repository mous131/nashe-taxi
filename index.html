<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Наше Такси - Заказ</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://api-maps.yandex.ru/2.1/?apikey=ваш_api_ключ&lang=ru_RU" type="text/javascript"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .ymaps-2-1-79-map {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body class="bg-gray-100">
    <div class="max-w-md mx-auto bg-white min-h-screen">
        <!-- Шапка -->
        <div class="bg-blue-600 text-white p-4 sticky top-0 z-10">
            <h1 class="text-xl font-bold">🚕 Наше Такси</h1>
            <p class="text-sm opacity-90">Выберите место назначения на карте</p>
        </div>
        
        <!-- Карта -->
        <div id="map" style="width: 100%; height: 300px;"></div>
        
        <!-- Форма заказа -->
        <div class="p-4">
            <div class="bg-white rounded-lg shadow-md p-4 mb-4">
                <div class="mb-3">
                    <label class="block text-sm font-medium text-gray-700 mb-1">📍 Откуда</label>
                    <input type="text" id="fromInput" placeholder="Ваше местоположение" 
                           class="w-full p-2 border rounded-lg bg-gray-50" readonly>
                </div>
                <div class="mb-3">
                    <label class="block text-sm font-medium text-gray-700 mb-1">🎯 Куда</label>
                    <input type="text" id="toInput" placeholder="Нажмите на карту" 
                           class="w-full p-2 border rounded-lg bg-gray-50" readonly>
                </div>
            </div>
            
            <!-- Информация о поездке -->
            <div id="tripInfo" class="bg-gray-50 rounded-lg p-4 mb-4 hidden">
                <div class="flex justify-between mb-2">
                    <span class="text-gray-600">📏 Расстояние:</span>
                    <span id="distance" class="font-semibold">0 км</span>
                </div>
                <div class="flex justify-between border-t pt-2 mt-2">
                    <span class="text-lg font-bold">💰 Стоимость:</span>
                    <span id="price" class="text-2xl font-bold text-green-600">0 ₽</span>
                </div>
            </div>
            
            <button id="orderBtn" 
                    disabled 
                    class="w-full bg-blue-500 text-white py-3 rounded-lg font-bold text-lg disabled:opacity-50 disabled:cursor-not-allowed hover:bg-blue-600 transition">
                Заказать
            </button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        
        const API_URL = 'https://mous131s-projects.vercel.app';
        let map;
        let fromPoint, toPoint;
        let fromPlacemark, toPlacemark;
        let currentRoute;
        
        // Функция для расчета расстояния между двумя точками
        function calculateDistance(point1, point2) {
            const R = 6371; // Радиус Земли в км
            const lat1 = point1.latitude * Math.PI / 180;
            const lat2 = point2.latitude * Math.PI / 180;
            const deltaLat = (point2.latitude - point1.latitude) * Math.PI / 180;
            const deltaLon = (point2.longitude - point1.longitude) * Math.PI / 180;
            
            const a = Math.sin(deltaLat/2) * Math.sin(deltaLat/2) +
                      Math.cos(lat1) * Math.cos(lat2) *
                      Math.sin(deltaLon/2) * Math.sin(deltaLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }
        
        // Функция расчета стоимости
        function calculatePrice(distance) {
            const basePrice = 99;
            const pricePerKm = 50;
            return Math.round(basePrice + (distance * pricePerKm));
        }
        
        // Инициализация Яндекс.Карты
        ymaps.ready(init);
        
        function init() {
            // Определяем местоположение пользователя
            let userLocation = [55.751244, 37.618423]; // Москва по умолчанию
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((position) => {
                    userLocation = [position.coords.latitude, position.coords.longitude];
                    map.setCenter(userLocation, 14);
                    
                    // Устанавливаем точку отправления
                    fromPoint = {
                        latitude: userLocation[0],
                        longitude: userLocation[1]
                    };
                    
                    // Создаем метку отправления
                    if (fromPlacemark) {
                        map.geoObjects.remove(fromPlacemark);
                    }
                    
                    fromPlacemark = new ymaps.Placemark(userLocation, {
                        balloonContent: 'Ваше местоположение',
                        iconContent: '📍'
                    }, {
                        preset: 'islands#greenStretchyIcon',
                        iconColor: '#00ff00'
                    });
                    
                    map.geoObjects.add(fromPlacemark);
                    
                    // Обновляем поле "Откуда"
                    getAddressFromCoords(userLocation[0], userLocation[1], (address) => {
                        document.getElementById('fromInput').value = address;
                    });
                });
            }
            
            // Создаем карту
            map = new ymaps.Map('map', {
                center: userLocation,
                zoom: 12,
                controls: ['zoomControl', 'fullscreenControl']
            });
            
            // Обработка клика на карте
            map.events.add('click', (e) => {
                const coords = e.get('coords');
                
                toPoint = {
                    latitude: coords[0],
                    longitude: coords[1]
                };
                
                // Удаляем старую метку назначения
                if (toPlacemark) {
                    map.geoObjects.remove(toPlacemark);
                }
                
                // Создаем новую метку назначения
                toPlacemark = new ymaps.Placemark(coords, {
                    balloonContent: 'Место назначения',
                    iconContent: '🎯'
                }, {
                    preset: 'islands#redStretchyIcon',
                    iconColor: '#ff0000'
                });
                
                map.geoObjects.add(toPlacemark);
                
                // Получаем адрес
                getAddressFromCoords(coords[0], coords[1], (address) => {
                    document.getElementById('toInput').value = address;
                });
                
                // Если есть точка отправления, строим маршрут и рассчитываем стоимость
                if (fromPoint) {
                    buildRouteAndCalculate();
                }
            });
            
            // Если геолокация не сработала, ставим точку по умолчанию
            if (!fromPoint) {
                fromPoint = {
                    latitude: userLocation[0],
                    longitude: userLocation[1]
                };
                
                fromPlacemark = new ymaps.Placemark(userLocation, {
                    balloonContent: 'Ваше местоположение',
                    iconContent: '📍'
                }, {
                    preset: 'islands#greenStretchyIcon'
                });
                
                map.geoObjects.add(fromPlacemark);
                
                getAddressFromCoords(userLocation[0], userLocation[1], (address) => {
                    document.getElementById('fromInput').value = address;
                });
            }
        }
        
        // Получение адреса по координатам
        function getAddressFromCoords(lat, lon, callback) {
            ymaps.geocode([lat, lon]).then((res) => {
                const firstGeoObject = res.geoObjects.get(0);
                const address = firstGeoObject.getAddressLine();
                callback(address);
            }).catch((error) => {
                console.error('Geocoding error:', error);
                callback(`${lat.toFixed(4)}, ${lon.toFixed(4)}`);
            });
        }
        
        // Построение маршрута и расчет стоимости
        function buildRouteAndCalculate() {
            if (!fromPoint || !toPoint) return;
            
            // Удаляем старый маршрут
            if (currentRoute) {
                map.geoObjects.remove(currentRoute);
            }
            
            // Строим маршрут
            ymaps.route([
                [fromPoint.latitude, fromPoint.longitude],
                [toPoint.latitude, toPoint.longitude]
            ], {
                mapStateAutoApply: true
            }).then((route) => {
                currentRoute = route;
                map.geoObjects.add(route);
                
                // Получаем расстояние
                const distance = route.getLength() / 1000; // в км
                const price = calculatePrice(distance);
                
                // Показываем информацию
                document.getElementById('tripInfo').classList.remove('hidden');
                document.getElementById('distance').textContent = `${distance.toFixed(1)} км`;
                document.getElementById('price').textContent = `${price} ₽`;
                
                // Активируем кнопку
                document.getElementById('orderBtn').disabled = false;
                
            }).catch((error) => {
                console.error('Route error:', error);
                tg.showAlert('Не удалось построить маршрут');
            });
        }
        
        // Оформление заказа
        async function placeOrder() {
            if (!fromPoint || !toPoint) {
                tg.showAlert('Пожалуйста, выберите место назначения');
                return;
            }
            
            const orderData = {
                from: document.getElementById('fromInput').value,
                to: document.getElementById('toInput').value,
                fromCoords: [fromPoint.latitude, fromPoint.longitude],
                toCoords: [toPoint.latitude, toPoint.longitude],
                distance: parseFloat(document.getElementById('distance').textContent),
                price: parseInt(document.getElementById('price').textContent),
                userId: tg.initDataUnsafe?.user?.id || 'anonymous',
                userName: tg.initDataUnsafe?.user?.first_name || 'Клиент'
            };
            
            try {
                const response = await fetch(`${API_URL}/api/order`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(orderData)
                });
                
                const data = await response.json();
                
                if (data.success) {
                    tg.showAlert(`✅ Заказ #${data.orderId} создан! Водитель скоро прибудет.`);
                    
                    // Отправляем данные обратно в бот
                    tg.sendData(JSON.stringify({
                        action: 'order_created',
                        orderId: data.orderId,
                        ...orderData
                    }));
                    
                    // Закрываем приложение через 2 секунды
                    setTimeout(() => {
                        tg.close();
                    }, 2000);
                } else {
                    tg.showAlert('❌ Ошибка создания заказа');
                }
            } catch (error) {
                console.error('Error placing order:', error);
                tg.showAlert('❌ Ошибка соединения. Попробуйте позже.');
            }
        }
        
        // Вешаем обработчик на кнопку
        document.getElementById('orderBtn').addEventListener('click', placeOrder);
    </script>
</body>
</html>
